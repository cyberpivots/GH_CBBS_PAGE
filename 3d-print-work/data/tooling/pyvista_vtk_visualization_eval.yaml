  - Installed in the CAD mesh-eval dependency group for generated visualization experiments.
risks:
  - VTK wheels are large; direct dependency adoption may slow setup.
  - PyVista 0.48.0 emits vtkGenericCell unsupported-cell-type stderr with the CadQuery-pinned VTK 9.3.1 runtime.
blockers:
  - Direct VTK imports remain blocked unless separately promoted through a direct dependency decision.
  - Keep PyVista pinned below 0.48 while cadquery-ocp pins VTK 9.3.1, unless a later probe proves the newer combination is quiet.
direct_import_allowed: true
blocked_claims:
  - Visualization output is advisory and cannot authorize CAD dimensions or product claims.
notes: Promoted to an optional mesh evaluation dependency on 2026-05-05 after explicit user approval; use generated artifacts only. The noisy 0.48.0 runtime was resolved by pinning pyvista to >=0.47.3,<0.48 and adding a stderr regression test.
