open_measurement_blockers:
  - Confirm exact physical display variant and rear component envelope.
  - Confirm JST-XH 4P harness exit, cable outer diameter, bend radius, and the candidate M12 gland or strain-relief part.
  - Confirm hinge pin material/diameter and printed ASA hinge clearance.
  - Validate snap latch closure and service cycling in the intended material.
notes: >
  Full wall/panel enclosure prototype for local Fusion review. The model now
  exports separate tray, front display-bezel door, hinge pin, display reference,
  gland reference, and assembly-view STEP files for closed, door-open, exploded,
  K1 split-plate, K1 Max combined-plate, and hardware-reference renders. This
  remains measurement-required and blocked from full-case/release status until
  the measurement blockers are resolved.
