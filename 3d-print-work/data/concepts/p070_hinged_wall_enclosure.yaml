parameter_sources:
  display_side_clearance_mm:
    source_ref: cbbs_display_panel_concept
    locator: "Required features: rear service clearance and mounting target"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Must be checked against the physical display edge and wall-mount installation.
  wall_thickness_mm:
    source_ref: prusa_modeling_guidance
    locator: "Wall thickness and extrusion-width-aware modeling guidance for FDM parts"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: 3.2 mm is an 8-line-width wall for a 0.4 mm K1 nozzle-class workflow.
  floor_thickness_mm:
    source_ref: prusa_modeling_guidance
    locator: "Wall thickness and extrusion-width-aware modeling guidance for FDM parts"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: 3.2 mm is an ASA/K1 prototype default, not a release-approved thickness.
  rear_clearance_depth_mm:
    source_ref: cbbs_display_panel_concept
    locator: "Blockers before CAD: rear clearance"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Placeholder depth; replace with measured rear component and cable bend envelope.
  front_door_thickness_mm:
    source_ref: prusa_modeling_guidance
    locator: "Wall thickness and extrusion-width-aware modeling guidance for FDM parts"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  door_gap_mm:
    source_ref: cbbs_validation_checklists
    locator: "Assembly check: lid closes without compressing electronics"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  corner_radius_mm:
    source_ref: cbbs_validation_checklists
    locator: "Field handling check: edges are not sharp"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  asa_rib_width_mm:
    source_ref: prusa_modeling_guidance
    locator: "Modeling guidance: design around nozzle/perimeter limits and avoid unsupported geometry"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  asa_rib_height_mm:
    source_ref: prusa_modeling_guidance
    locator: "Modeling guidance: design around nozzle/perimeter limits and avoid unsupported geometry"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  display_window_clearance_mm:
    source_ref: nextion_p070_dimension_pdf
    locator: "NX8048P070-011C drawing page 1: active area and LCD outsize dimensions"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Window is active-area derived and intentionally remains inside the LCD outsize.
  hinge_pin_diameter_mm:
    source_ref: nbk_metric_clearance_holes
    locator: "Metric clearance table: M3 nominal screw diameter"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Uses a 3.0 mm metal pin or M3 smooth shank as the candidate hinge pin.
  hinge_pin_clearance_diameter_mm:
    source_ref: nbk_metric_clearance_holes
    locator: "Metric clearance table: M3 normal clearance hole is 3.4 mm"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Clearance must still be validated in printed ASA.
  hinge_barrel_outer_diameter_mm:
    source_ref: cbbs_candidate_bom_standards
    locator: "Fasteners and inserts rules"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  hinge_barrel_length_mm:
    source_ref: cbbs_display_panel_concept
    locator: "Prototype sequence: add rear cover and stand/wall features after fit passes"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  hinge_barrel_gap_mm:
    source_ref: prusa_modeling_guidance
    locator: "Modeling guidance: tolerances and print-process clearance must be tuned for FDM"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Gap is a prototype visual/assembly clearance and requires ASA cycling validation.
  hinge_knuckle_count:
    source_ref: cbbs_validation_checklists
    locator: "Assembly check: hinge swing and repeated service access"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Odd count supports a symmetric tray/door/tray/door/tray hinge pattern.
  hinge_barrel_print_flat_depth_mm:
    source_ref: prusa_modeling_guidance
    locator: "Overhang/support and print-bed orientation guidance for FDM parts"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Flat is a first-layer aid for review geometry; ASA fit and hinge cycling remain blocked.
  hinge_barrel_end_chamfer_mm:
    source_ref: prusa_modeling_guidance
    locator: "Fillet/chamfer and minimum feature-size guidance for FDM parts"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Small chamfer is a printability aid and must be checked on the selected nozzle/profile.
  snap_latch_width_mm:
    source_ref: cbbs_validation_checklists
    locator: "Assembly check: fasteners engage consistently"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Snap latch is not validated until printed in the intended material.
  snap_latch_depth_mm:
    source_ref: cbbs_validation_checklists
    locator: "Assembly check: disassembly does not damage the display or harness"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  snap_latch_height_mm:
    source_ref: cbbs_validation_checklists
    locator: "Assembly check: disassembly does not damage the display or harness"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  bottom_gland_boss_outer_diameter_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 data: ØA 16.6 mm reference; boss adds printed wall margin"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Boss is a printable pad around a candidate M12 gland, not a modeled thread.
  bottom_gland_clearance_diameter_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 metric thread designation"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Clearance hole is for an M12x1.5 gland body; no printed thread is modeled.
  bottom_gland_boss_length_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 data: thread length D = 8 mm"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  bottom_gland_reference_outer_diameter_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 data sheet: ØA = 16.6 mm"
    retrieved_on: 2026-05-02
    evidence_type: vendor-datasheet
    verification_status: verified
  bottom_gland_reference_length_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 table: overall length C = 30.0 mm"
