    evidence_type: vendor-datasheet
    verification_status: verified
  bottom_gland_reference_cable_range_max_mm:
    source_ref: lapp_skintop_st_m
    locator: "SKINTOP ST-M M12x1.5 table: clamping range ØF = 3.5-7 mm"
    retrieved_on: 2026-05-02
    evidence_type: vendor-datasheet
    verification_status: verified
  display_mount_boss_outer_diameter_mm:
    source_ref: cbbs_candidate_bom_standards
    locator: "Fasteners: match screw size to actual board/display holes"
