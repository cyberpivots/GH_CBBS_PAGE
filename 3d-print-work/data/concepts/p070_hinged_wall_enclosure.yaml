    evidence_type: design-parameter
    verification_status: pending-measurement
  display_mount_boss_height_mm:
    source_ref: cbbs_display_panel_concept
    locator: "Required features: mounting holes matched to official drawing and measured hardware"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  display_mount_hole_clearance_diameter_mm:
    source_ref: nextion_p070_dimension_pdf
    locator: "NX8048P070-011C drawing page 1: 4-dia 3.20"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: Clearance parameter must be validated with selected fasteners and measured display holes.
  display_mount_thread_pilot_diameter_mm:
    source_ref: cbbs_candidate_bom_standards
    locator: "Fasteners: M3 for larger enclosure screws, wall tabs, and panel hardware"
    retrieved_on: 2026-05-03
    evidence_type: design-parameter
    verification_status: pending-measurement
    notes: 2.6 mm is a first-pass printed pilot for M3 thread forming/tapping in ASA bosses.
  wall_mount_hole_diameter_mm:
    source_ref: cbbs_candidate_bom_standards
    locator: "Fasteners: M3 for larger enclosure screws, wall tabs, and panel hardware"
    retrieved_on: 2026-05-02
    evidence_type: design-parameter
    verification_status: pending-measurement
  wall_mount_inset_x_mm:
    source_ref: cbbs_display_panel_concept
    locator: "Variants: p070-wall-panel"
