    evidence_type: design-parameter
    verification_status: pending-measurement
outputs:
  - step
  - stl
blocked_full_case: true
generation_enabled: true
generation_blockers:
  - Confirm the physical display is NX8048P070-011C.
  - Measure rear component envelope and cable bend space.
  - Select and measure bottom cable gland or strain-relief hardware.
  - Select hinge pin stock and validate printed hinge clearance.
  - Print and validate snap-latch tolerance in the intended material.
  - Mark the display hardware and concept measured before enabling full-case generation.
environmental_context:
  exposure: lab
  ruggedization:
    - cable-entry
    - mounting-tabs
  source_refs:
    - cbbs_display_panel_concept
    - cbbs_validation_checklists
  validation_plan:
    - Verify display fit, rear component clearance, touch/display use with door open, cable strain, hinge swing, and snap-latch retention.
  rating_claims: []
