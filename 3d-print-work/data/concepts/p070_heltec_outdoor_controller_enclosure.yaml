open_measurement_blockers:
  - Confirm exact Heltec V2 board revision, connector population, buttons, OLED location, and LoRa pigtail route.
  - Confirm battery pack, regulator, charger connector, display load, Heltec transmit duty cycle, heat rise, and cable retention.
  - Confirm gasket, drip-lip, fastener, venting, material, and service-cycle behavior with printed prototypes.
  - Confirm RF antenna placement and bulkhead connector compatibility before release review.
  - Confirm raised CBBS text, contour rails, and macro rib texture print cleanly in the intended material and do not interfere with service handling.
notes: >
  Internal review all-in-one P070 controller concept with rear battery pod,
  Heltec V2 reference board, external antenna keepout, and long-run power
  reference. It includes prototype raised surface treatment and carries no
  enclosure protection class or field-readiness claim.
